name: Publish JSlug Library to npm

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to apply before publishing
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        working-directory: src/library
        run: 'npm version ${{ inputs.release_type }} -m "chore(release): %s [skip ci]"'

      - name: Build package
        run: npm run build:lib

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --prefix src/library --access public

      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags